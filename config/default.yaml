app:
  debug: false
  name: "CHESSPLAYER"
  theme: "grayscale"

paths:
  data_dir: "data"
  assets_dir: "assets"
  pieces_dir: "assets/pieces"
  engines_dir: "assets/engines"

pgn_sources:
  active_source:
    type: "archive_file"
    path: "data/Carlsen.pgn"
  additional_sources: []

indexing:
  backend: "sqlite"
  force_rebuild: false
  workers: 1

browsing:
  page_size: 200

engine:
  enabled_on_start: false
  path: "assets/engines/stockfish-windows-x86-64-avx2/stockfish/stockfish-windows-x86-64-avx2.exe"

coach:
  # PGN source used by the coach for GM precedent matching.
  # This is INDEPENDENT from pgn_sources.active_source (the browser).
  # To switch to the 6M game database, change this path only.
  # The coach indexer will detect the change and re-index automatically.
  pgn_source: "data/Carlsen.pgn"

  # Phrase database — Nimzowitsch coaching language.
  phrase_db: "data/chess_coach.db"

  # Minimum rating filter for GM precedents.
  # Set to 0 for Carlsen.pgn (all games are high quality).
  # Raise to 2400 when switching to the 6M game database.
  min_rating: 0

  # Stockfish analysis time per position during indexing (ms).
  # Keep low during development. Raise for production quality evals.
  movetime_ms: 500

  # Automatically index on first run if coach_positions is empty.
  auto_index: true
